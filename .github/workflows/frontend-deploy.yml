name: Frontend Deploy

# Releases the Next.js frontend to Cloudflare Workers (via the OpenNext adapter)
# on every push to main that touches the frontend, or on manual dispatch.
on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-deploy.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: frontend

# Avoid overlapping deploys racing each other.
concurrency:
  group: frontend-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy to Cloudflare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # NEXT_PUBLIC_API_URL is inlined into the bundle at build time, so it must
      # be present here — not just at runtime. Set it as a repo variable.
      - name: Build OpenNext worker bundle
        run: npx opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_APP_NAME: ${{ vars.NEXT_PUBLIC_APP_NAME }}

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}